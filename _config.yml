title: "Project Management — CTAF"
description: "Cardiac Traceability Agent Framework — simulazione di gestione progetto (committente: Cardiologia di Forlì)"

# Tema documentale con sidebar laterale e ricerca
remote_theme: just-the-docs/just-the-docs@v0.7.0

# Project page: il sito è servito sotto /pm-project
url: "https://lorybug.github.io"
baseurl: "/pm-project"

# Ricerca e navigazione
search_enabled: true
heading_anchors: true
color_scheme: light

aux_links:
  "Repository GitHub":
    - "https://github.com/LoryBug/pm-project"
aux_links_new_tab: true

# Footer
back_to_top: true
back_to_top_text: "Torna su"

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-optional-front-matter
